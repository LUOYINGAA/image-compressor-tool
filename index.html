<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🖼️ Image Compressor</h1>
            <p class="text-gray-500">Compress images locally in your browser. No uploads, 100% private.</p>
        </div>

        <div id="dropZone" class="border-4 border-dashed border-indigo-300 rounded-xl p-10 text-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition-all duration-300 mb-6">
            <div class="text-6xl mb-4">📁</div>
            <p class="text-lg font-medium text-gray-600 mb-2">Drag & drop images here</p>
            <p class="text-sm text-gray-400">or click to browse</p>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div>

        <div id="settingsPanel" class="bg-gray-50 rounded-xl p-6 mb-6 space-y-5 hidden">
            <h3 class="font-semibold text-gray-700">⚙️ Compression Settings</h3>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">Quality: <span id="qualityValue" class="text-indigo-600 font-bold">80</span>%</label>
                <input type="range" id="qualitySlider" min="10" max="100" value="80" class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Max Width (px)</label>
                    <input type="number" id="maxWidth" value="1920" min="100" max="4000" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Max Height (px)</label>
                    <input type="number" id="maxHeight" value="1080" min="100" max="4000" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
            </div>
            <button id="compressBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors duration-200">
                ✨ Compress Image
            </button>
        </div>

        <div id="previewSection" class="hidden mb-6">
            <div class="bg-gray-50 rounded-xl p-4 mb-4">
                <h3 class="font-semibold text-gray-700 mb-3">📸 Preview</h3>
                <div class="flex items-center gap-4 flex-wrap">
                    <div class="flex-1 min-w-[150px]">
                        <p class="text-xs text-gray-500 mb-1">Original</p>
                        <img id="originalPreview" class="max-h-40 mx-auto rounded-lg shadow">
                        <p id="originalSize" class="text-xs text-center text-gray-500 mt-1"></p>
                    </div>
                    <div class="text-2xl text-gray-400">→</div>
                    <div class="flex-1 min-w-[150px]">
                        <p class="text-xs text-gray-500 mb-1">Compressed</p>
                        <img id="compressedPreview" class="max-h-40 mx-auto rounded-lg shadow">
                        <p id="compressedSize" class="text-xs text-center text-gray-500 mt-1"></p>
                    </div>
                </div>
            </div>
            <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center mb-4">
                <p class="text-green-700 font-medium">✅ Compression complete!</p>
                <p id="savingsText" class="text-sm text-green-600 mt-1"></p>
            </div>
            <button id="downloadBtn" class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition-colors duration-200 flex items-center justify-center gap-2">
                <span>⬇️</span> Download Compressed Image
            </button>
        </div>

        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 text-center mb-4"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const settingsPanel = document.getElementById('settingsPanel');
        const previewSection = document.getElementById('previewSection');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');

        let currentFile = null;
        let compressedBlob = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-indigo-500', 'bg-indigo-50'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-indigo-500', 'bg-indigo-50'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500', 'bg-indigo-50');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) loadImage(file);
            else showError('Please select a valid image file.');
        });

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) loadImage(file);
        });

        qualitySlider.addEventListener('input', () => qualityValue.textContent = qualitySlider.value);

        function loadImage(file) {
            currentFile = file;
            errorMsg.classList.add('hidden');
            settingsPanel.classList.remove('hidden');
            previewSection.classList.add('hidden');

            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('originalPreview');
                img.src = e.target.result;
                document.getElementById('originalSize').textContent = formatSize(file.size);
            };
            reader.readAsDataURL(file);
        }

        compressBtn.addEventListener('click', () => {
            if (!currentFile) return;
            compressBtn.textContent = '⏳ Compressing...';
            compressBtn.disabled = true;

            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('previewSection').querySelector('canvas') || document.createElement('canvas');
                let { width, height } = img;
                const maxW = parseInt(document.getElementById('maxWidth').value) || 1920;
                const maxH = parseInt(document.getElementById('maxHeight').value) || 1080;

                if (width > maxW) { height = Math.round(height * maxW / width); width = maxW; }
                if (height > maxH) { width = Math.round(width * maxH / height); height = maxH; }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const quality = parseInt(qualitySlider.value) / 100;
                canvas.toBlob(blob => {
                    compressedBlob = blob;
                    const compImg = document.getElementById('compressedPreview');
                    compImg.src = URL.createObjectURL(blob);
                    document.getElementById('compressedSize').textContent = formatSize(blob.size);
                    const savings = ((1 - blob.size / currentFile.size) * 100).toFixed(1);
                    document.getElementById('savingsText').textContent = `Saved ${savings}% (${formatSize(currentFile.size)} → ${formatSize(blob.size)})`;

                    previewSection.classList.remove('hidden');
                    compressBtn.textContent = '✨ Compress Image';
                    compressBtn.disabled = false;
                }, 'image/jpeg', quality);
            };
            img.src = URL.createObjectURL(currentFile);
        });

        downloadBtn.addEventListener('click', () => {
            if (!compressedBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(compressedBlob);
            link.download = 'compressed-' + (currentFile?.name || 'image.jpg');
            link.click();
        });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(2) + ' MB';
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
